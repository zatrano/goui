name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25.x"

jobs:
  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "adapters/stdlib"
          - "adapters/fiber"
          - "adapters/gin"
          - "adapters/echo"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: |
            go.sum
            adapters/**/go.sum
            examples/go.sum

      - name: gofmt
        working-directory: ${{ matrix.module }}
        shell: bash
        run: |
          mapfile -t files < <(go list -f '{{range .GoFiles}}{{$.Dir}}/{{.}}{{println}}{{end}}{{range .TestGoFiles}}{{$.Dir}}/{{.}}{{println}}{{end}}{{range .XTestGoFiles}}{{$.Dir}}/{{.}}{{println}}{{end}}' ./...)
          if [ ${#files[@]} -eq 0 ]; then
            exit 0
          fi
          unformatted="$(gofmt -l "${files[@]}")"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}
          args: --timeout=5m

  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "adapters/stdlib"
          - "adapters/fiber"
          - "adapters/gin"
          - "adapters/echo"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: |
            go.sum
            adapters/**/go.sum
            examples/go.sum

      - name: go test
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 ./...

  build:
    name: Build (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "adapters/stdlib"
          - "adapters/fiber"
          - "adapters/gin"
          - "adapters/echo"
          - "examples"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: |
            go.sum
            adapters/**/go.sum
            examples/go.sum

      - name: go build
        working-directory: ${{ matrix.module }}
        run: go build ./...

  security:
    name: Security (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "adapters/stdlib"
          - "adapters/fiber"
          - "adapters/gin"
          - "adapters/echo"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: |
            go.sum
            adapters/**/go.sum
            examples/go.sum

      - name: govulncheck
        shell: bash
        working-directory: ${{ matrix.module }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
