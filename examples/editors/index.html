<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoUI — Editörler</title>
  <link rel="stylesheet" href="/forms/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 52rem;
      margin: 2rem auto;
      padding: 0 1rem;
      color: var(--color-goui-text);
    }
    h1 { font-size: 1.35rem; margin-bottom: 0.35rem; }
    .lead { color: oklch(45% 0.02 250); margin-bottom: 1.25rem; font-size: 0.95rem; }
    .demo-section { margin-bottom: 1.75rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--color-goui-border); }
    .demo-section h2 { font-size: 1rem; margin: 0 0 0.65rem; }
    .hint { font-size: 0.875rem; color: oklch(45% 0.02 250); margin-top: 0.65rem; }
    #status { margin-top: 1rem; font-size: 0.875rem; color: oklch(45% 0.02 250); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="status">Connecting...</div>

  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/go/go.min.js"></script>

  <script type="module">
    import { GoUIClient } from '/client/goui.js';
    import { enhanceRichText } from '/client/modules/richtext.js';
    import { enhanceCodeEditor } from '/client/modules/codeeditor.js';

    enhanceRichText(document);
    enhanceCodeEditor(document);

    const status = document.getElementById('status');
    const client = new GoUIClient('/goui/ws', 'editors', {
      mount: '#app',
      onConnect() { status.textContent = 'Connected'; },
      onError(msg) { status.textContent = 'Error: ' + msg; },
    });
    client.connect();
  </script>
</body>
</html>
